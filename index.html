<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini | Düşünen Asistan</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #131314; --side: #1e1f20; --text: #e3e3e3; --accent: #4285f4; }
        body { margin: 0; font-family: 'Google Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; }
        
        .sidebar { width: 260px; background: var(--side); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; position: relative; }
        
        #chatArea { width: 100%; max-width: 800px; flex: 1; overflow-y: auto; margin-bottom: 20px; }
        
        /* Düşünme Kutusu Stili */
        .thought-bubble {
            background: #1a1a1c;
            border-left: 3px solid #888;
            padding: 15px;
            margin: 10px 0;
            font-size: 14px;
            color: #aaa;
            border-radius: 4px;
        }
        .thought-header { font-weight: bold; font-size: 12px; margin-bottom: 5px; color: #4285f4; text-transform: uppercase; }

        .input-box { width: 100%; max-width: 800px; background: var(--side); border-radius: 28px; padding: 15px 25px; display: flex; align-items: center; gap: 15px; }
        textarea { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; resize: none; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        
        .greeting { font-size: 44px; font-weight: 500; margin-top: 10vh; background: linear-gradient(to right, #4285f4, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="font-weight: 500; font-size: 20px;">Gemini <span style="font-size: 12px; color:var(--accent)">DÜŞÜNEN</span></div>
        <div style="margin-top:20px; font-size:13px; color:#888;">Gecikmiş adalet adalet değildir.</div>
    </div>
    <div class="main">
        <div id="welcome" class="greeting">Merhaba Emirhan</div>
        <div id="chatArea"></div>
        <div class="input-box">
            <textarea id="inp" placeholder="Düşünmesini istediğiniz bir konu yazın..." rows="1"></textarea>
            <button id="btn" onclick="ask()">Gönder</button>
        </div>
    </div>

    <script>
        async function ask() {
            const inp = document.getElementById('inp');
            const chat = document.getElementById('chatArea');
            const welcome = document.getElementById('welcome');
            if(!inp.value.trim()) return;

            welcome.style.display = 'none';
            const userMsg = inp.value;
            chat.innerHTML += `<div style="margin:20px 0; font-weight:500;">Siz: ${userMsg}</div>`;
            const loadingId = "L" + Date.now();
            chat.innerHTML += `<div id="${loadingId}" style="color:#4285f4;">Muhakeme ediliyor...</div>`;
            inp.value = '';

            try {
                const res = await fetch('/api/katip', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: userMsg})
                });
                const data = await res.json();
                document.getElementById(loadingId).remove();

                // Düşünce ve Cevabı Ayıkla
                const raw = data.result;
                let thought = "";
                let answer = raw;

                if(raw.includes("[CEVAP]")) {
                    thought = raw.split("[CEVAP]")[0].replace("[DÜŞÜNCE]", "").trim();
                    answer = raw.split("[CEVAP]")[1].trim();
                }

                if(thought) {
                    chat.innerHTML += `<div class="thought-bubble"><div class="thought-header">Düşünce Süreci</div>${thought}</div>`;
                }
                chat.innerHTML += `<div style="margin-top:15px; line-height:1.6;">${answer}</div><hr style="border:0; border-top:1px solid #333; margin:20px 0;">`;

            } catch (e) {
                document.getElementById(loadingId).innerHTML = "Hata oluştu.";
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
