<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f9fbff; --sidebar: #ffffff; --primary: #1a73e8; --text: #202124; --border: #dadce0; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; }
        
        /* Sol Kontrol Paneli */
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .model-select { padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #f1f3f4; font-size: 14px; outline: none; cursor: pointer; }
        
        /* Ana Sohbet Alanı */
        .chat-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 40px 20%; display: flex; flex-direction: column; gap: 25px; }
        
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 18px; font-size: 15px; line-height: 1.6; }
        .user { background: #e8f0fe; align-self: flex-end; color: #174ea6; }
        .ai { background: transparent; align-self: flex-start; border-left: 3px solid var(--primary); padding-left: 20px; }

        /* Giriş Barı */
        .input-wrapper { padding: 20px 20%; background: var(--bg); border-top: 1px solid var(--border); }
        .input-box { background: white; border: 1px solid var(--border); border-radius: 24px; padding: 10px 20px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        textarea { flex: 1; border: none; outline: none; font-size: 16px; resize: none; max-height: 200px; padding: 8px 0; }
        
        .action-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: #5f6368; padding: 8px; border-radius: 50%; transition: background 0.2s; }
        .action-btn:hover { background: #f1f3f4; }
        #send-btn { color: var(--primary); font-weight: 600; }

        /* Preview Alanı */
        #preview { display: none; padding: 10px; background: #fff; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="font-weight: 600; font-size: 18px; color: var(--primary);">Gemini 3.1 Workspace</div>
    <label style="font-size: 12px; color: #70757a;">MODEL SEÇİMİ</label>
    <select id="modelSelect" class="model-select">
        <option value="gemini-3-flash-preview">Gemini 3 Flash (Hızlı)</option>
        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro (Derin Düşünce)</option>
    </select>
    <div style="margin-top: auto; font-size: 11px; color: #9aa0a6;">© 2026 Emirhan AI Lab</div>
</div>

<div class="chat-container">
    <div id="chat-window">
        <div class="ai">Merhaba Emirhan! Sana bugün nasıl yardımcı olabilirim? Dosya veya fotoğraf yükleyebilir, istediğin konuyu sorabilirsin.</div>
    </div>

    <div class="input-wrapper">
        <div id="preview"></div>
        <div class="input-box">
            <button class="action-btn" onclick="document.getElementById('fileInp').click()">📎</button>
            <input type="file" id="fileInp" style="display:none" onchange="handleFile(this)">
            
            <textarea id="userInput" placeholder="Mesajınızı buraya yazın... (Enter ile gönder)" rows="1" onkeydown="handleEnter(event)"></textarea>
            
            <button id="send-btn" class="action-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script>
    let currentFileData = null;

    function handleEnter(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function handleFile(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            currentFileData = e.target.result;
            const preview = document.getElementById('preview');
            preview.style.display = 'block';
            preview.innerHTML = `📄 Dosya Hazır: <b>${file.name}</b> <span onclick="clearFile()" style="cursor:pointer;color:red;margin-left:10px">✖</span>`;
        };
        
        if (file.type.startsWith('image/')) {
            reader.readAsDataURL(file);
        } else {
            reader.readAsText(file); // PDF/TXT için metin olarak oku
        }
    }

    function clearFile() {
        currentFileData = null;
        document.getElementById('preview').style.display = 'none';
        document.getElementById('fileInp').value = '';
    }

    async function sendMessage() {
        const inp = document.getElementById('userInput');
        const chat = document.getElementById('chat-window');
        const text = inp.value.trim();
        const model = document.getElementById('modelSelect').value;

        if (!text && !currentFileData) return;

        chat.innerHTML += `<div class="msg user">${text} ${currentFileData && !currentFileData.startsWith('data:image') ? '<br><i>(Dosya içeriği eklendi)</i>' : ''}</div>`;
        const loadingId = "L" + Date.now();
        chat.innerHTML += `<div id="${loadingId}" class="ai" style="color:#1a73e8">Analiz ediliyor...</div>`;
        
        const payload = {
            text: currentFileData && !currentFileData.startsWith('data:image') ? `Dosya içeriği: ${currentFileData}\n\nSoru: ${text}` : text,
            image: currentFileData && currentFileData.startsWith('data:image') ? currentFileData : null,
            model: model
        };

        inp.value = '';
        clearFile();

        try {
            const res = await fetch('/api/katip', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            document.getElementById(loadingId).remove();
            chat.innerHTML += `<div class="msg ai">${data.result}</div>`;
        } catch (e) {
            document.getElementById(loadingId).innerText = "Hata: " + e.message;
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
